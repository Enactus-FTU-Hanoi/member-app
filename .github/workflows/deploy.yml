name: Deploy member-app → GitHub Pages

on:
  push:
    branches: [main]
    paths: ['member-app/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: member-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: member-app

      - name: Build
        run: npm run build
        working-directory: member-app
        env:
          VITE_API_URL: https://api.enactusftuhanoi.id.vn

      # SPA fallback: copy index.html → 404.html so React Router works
      - name: SPA fallback
        run: cp member-app/dist/index.html member-app/dist/404.html

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: member-app/dist

      - id: deployment
        uses: actions/deploy-pages@v4
